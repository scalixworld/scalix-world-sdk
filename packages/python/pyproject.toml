[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "scalix"
version = "1.0.0"
description = "Scalix SDK — chat, research, audio, images, text, RAG, docgen, database, storage, and admin APIs for building AI applications."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Scalix", email = "sdk@scalix.world" },
]
keywords = [
    "ai",
    "agents",
    "llm",
    "sdk",
    "scalix",
    "sandbox",
    "routing",
    "mcp",
    "a2a",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.25.0",
    "pydantic>=2.5.0",
]

[project.optional-dependencies]
# Local mode providers
local = [
    "docker>=7.0.0",
    "aiosqlite>=0.20.0",
]

# LLM provider clients (for local mode direct calls)
openai = ["openai>=1.0.0"]
anthropic = ["anthropic>=0.40.0"]
google = ["google-generativeai>=0.8.0"]
ollama = ["ollama>=0.4.0"]

# All LLM providers
all-providers = [
    "openai>=1.0.0",
    "anthropic>=0.40.0",
    "google-generativeai>=0.8.0",
    "ollama>=0.4.0",
]

# Cloud mode (Scalix infrastructure)
cloud = []

# Protocol support
mcp = ["mcp>=1.0.0"]

# CLI
cli = [
    "click>=8.1.0",
    "aiohttp>=3.9.0",
]

# Full installation
all = [
    "scalix[local,all-providers,cloud,mcp,cli]",
]

# Development
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.8.0",
    "mypy>=1.13.0",
]

[project.scripts]
scalix = "scalix.cli.main:main"

[project.urls]
Homepage = "https://scalix.world/sdk"
Documentation = "https://docs.scalix.world/sdk"
Repository = "https://github.com/scalixworld/scalix-sdk"
Issues = "https://github.com/scalixworld/scalix-sdk/issues"
Changelog = "https://github.com/scalixworld/scalix-sdk/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["scalix"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "TCH"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
