name: CI & Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install, build, test
        working-directory: packages/typescript
        run: |
          npm ci
          npm run build
          npm test --if-present
      - name: Verify import
        working-directory: packages/typescript
        run: node -e "import('./dist/index.js').then(m => console.log('OK:', Object.keys(m).length, 'exports'))"
      - name: Check package contents
        working-directory: packages/typescript
        run: npm pack --dry-run

  ci-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: packages/python
        run: |
          pip install --upgrade pip build
          pip install -e ".[dev]"
      - name: Verify import
        working-directory: packages/python
        run: python -c "from scalix import ScalixClient; print('OK:', ScalixClient)"
      - name: Build distribution
        working-directory: packages/python
        run: python -m build

  publish-npm:
    needs: [ci-typescript, ci-python]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Build and publish
        working-directory: packages/typescript
        run: |
          npm ci
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    needs: [ci-typescript, ci-python]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build and publish
        working-directory: packages/python
        run: |
          pip install --upgrade pip build twine
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
