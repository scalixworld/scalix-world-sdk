[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "scalix"
version = "1.0.0"
description = "Scalix SDK — Python client for chat, research, audio, images, text, RAG, docgen, database, storage, and account APIs."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Scalix World", email = "sdk@scalix.world" },
]
keywords = [
    "ai",
    "llm",
    "sdk",
    "scalix",
    "chat",
    "tts",
    "rag",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.25.0",
    "pydantic>=2.5.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.8.0",
    "mypy>=1.13.0",
]

[project.urls]
Homepage = "https://scalix.world"
Documentation = "https://docs.scalix.world/sdk"
Repository = "https://github.com/scalixworld/scalix-sdk"
Issues = "https://github.com/scalixworld/scalix-sdk/issues"

[tool.hatch.build.targets.wheel]
packages = ["scalix"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "TCH"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
